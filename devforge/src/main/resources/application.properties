#spring.datasource.url=jdbc:postgresql://localhost:5432/devforge_db
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devforge_db}
#spring.datasource.username=postgres
spring.datasource.username=${DB_USERNAME:postgres}
#spring.datasource.password=dummypassword
spring.datasource.password=${DB_PASSWORD:dummypassword}

spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
#jwt.key=Hello my name is Ronie Samuel this is my first project
jwt.key=${JWT_SECRET:Hello my name is Ronie Samuel this is my first project}